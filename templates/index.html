<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<title>G3Bot</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body bgcolor="#DDDDDD" text="#000000" link="#0000CC" vlink="#660099"
      topmargin="2" leftmargin="2" marginheight="2" marginwidth="2">

<center>
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr><td bgcolor="#FFFFFF">
<table border="0" cellspacing="1" cellpadding="0" width="100%">
<tr><td bgcolor="#888888">
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr><td bgcolor="#EEEEEE">

<!-- TITLE BAR -->
<table border="0" cellspacing="0" cellpadding="2" width="100%" bgcolor="#CCCCCC">
<tr>
  <td align="center">
    <font face="Charcoal, Geneva, Chicago, Arial, sans-serif" size="2">
      <b>&#9674; G3Bot</b>
    </font>
  </td>
</tr>
<tr><td bgcolor="#BBBBBB" height="1"></td></tr>
</table>

<!-- MAIN CONTENT -->
<table border="0" cellspacing="0" cellpadding="4" width="100%">
<tr><td>

{% if error_text %}
<table border="0" cellspacing="0" cellpadding="3" width="100%" bgcolor="#FFCCCC">
<tr>
  <td bgcolor="#FF9999" width="3"></td>
  <td><font face="Geneva, Arial, sans-serif" size="1" color="#990000"><b>Erreur :</b> {{ error_text }}</font></td>
</tr>
</table>
{% endif %}

{% if status_text %}
<font face="Geneva, Arial, sans-serif" size="1" color="#555555">{{ status_text }}</font>
<br>
{% endif %}

<!-- CHAT FORM -->
<form method="POST" action="/chat">

<table border="0" cellspacing="0" cellpadding="1" width="100%">
<tr>
  <td><font face="Geneva, Arial, sans-serif" size="2"><b>Modele :</b></font></td>
  <td width="100%">
    <select name="model">
      <option value="">-- Choisir --</option>
      {% for m in models %}
      <option value="{{ m.id }}"{% if m.id == selected_model %} selected{% endif %}>{{ m.company }} &mdash; {{ m.name }}</option>
      {% endfor %}
    </select>
  </td>
</tr>
</table>

<font face="Geneva, Arial, sans-serif" size="2"><b>Prompt :</b></font><br>
<textarea name="prompt" rows="3" cols="95" wrap="soft">{{ prompt_text }}</textarea>
<br>

<table border="0" cellspacing="0" cellpadding="1">
<tr>
  <td><input type="submit" value=" Envoyer "></td>
</tr>
</table>

</form>

<!-- ACTION BUTTONS -->
<table border="0" cellspacing="0" cellpadding="1">
<tr>
  <td><form method="GET" action="/clear"><input type="submit" value=" Effacer "></form></td>
  <td><form method="POST" action="/refresh"><input type="submit" value="Rafraichir modeles"></form></td>
  <td><form method="GET" action="/models"><input type="submit" value="Details modeles"></form></td>
</tr>
</table>

<!-- RESPONSE -->
<font face="Geneva, Arial, sans-serif" size="2"><b>Reponse :</b></font>
<br>
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr><td bgcolor="#666666">
<table border="0" cellspacing="1" cellpadding="0" width="100%">
<tr><td bgcolor="#111133">
  <table border="0" cellspacing="0" cellpadding="4" width="100%">
  <tr><td>
    <font face="Monaco, Courier, monospace" size="2" color="#55EE55">
      {% if response_text %}{{ response_text|nl2br }}{% else %}Aucune reponse pour l'instant.{% endif %}
    </font>
  </td></tr>
  </table>
</td></tr>
</table>
</td></tr>
</table>

<font face="Geneva, Arial, sans-serif" size="1" color="#999999">
G3Bot &mdash; NAS Docker &mdash; Cle API sur le serveur
</font>

</td></tr>
</table>

</td></tr></table>
</td></tr></table>
</td></tr></table>

</center>

</body>
</html>
