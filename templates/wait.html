<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta http-equiv="refresh" content="2;url=/wait/{{ req_id }}">
<title>G3Bot - Chargement...</title>
</head>

<body bgcolor="#DDDDDD" text="#000000"
      topmargin="2" leftmargin="2" marginheight="2" marginwidth="2">

<center>
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr><td bgcolor="#FFFFFF">
<table border="0" cellspacing="1" cellpadding="0" width="100%">
<tr><td bgcolor="#888888">
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr><td bgcolor="#EEEEEE">

<!-- TITLE BAR -->
<table border="0" cellspacing="0" cellpadding="2" width="100%" bgcolor="#CCCCCC">
<tr>
  <td align="center">
    <font face="Charcoal, Geneva, Chicago, Arial, sans-serif" size="2">
      <b>&#9674; G3Bot &mdash; Chargement...</b>
    </font>
  </td>
</tr>
<tr><td bgcolor="#BBBBBB" height="1"></td></tr>
</table>

<!-- CONTENT -->
<table border="0" cellspacing="0" cellpadding="20" width="100%">
<tr><td align="center">

  <font face="Geneva, Arial, sans-serif" size="3">
    <b>Generation en cours...</b>
  </font>
  <br>
  <font face="Geneva, Arial, sans-serif" size="1" color="#555555">
    {{ model_id }}
  </font>
  <br><br>

  <!-- PROGRESS BAR -->
  <table border="0" cellspacing="0" cellpadding="0" width="70%">
  <tr><td bgcolor="#FFFFFF">
  <table border="0" cellspacing="1" cellpadding="0" width="100%">
  <tr><td bgcolor="#999999">
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
    <tr>
      {% if progress > 0 %}
      <td bgcolor="#3366CC" width="{{ progress }}%" height="14">
        <font size="1" color="#FFFFFF">&nbsp;</font>
      </td>
      {% endif %}
      {% if progress < 100 %}
      <td bgcolor="#EEEEEE" width="{{ 100 - progress }}%" height="14">&nbsp;</td>
      {% endif %}
    </tr>
    </table>
  </td></tr>
  </table>
  </td></tr>
  </table>

  <br>
  <font face="Geneva, Arial, sans-serif" size="1" color="#888888">
    {{ progress }}% &mdash; Rafraichissement automatique
  </font>

</td></tr>
</table>

</td></tr></table>
</td></tr></table>
</td></tr></table>

</center>

</body>
</html>
