<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta http-equiv="refresh" content="2;url=/wait/{{ req_id }}">
<title>G3Bot - Chargement...</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body bgcolor="#C0C0C0" text="#000000"
      topmargin="0" leftmargin="0" marginheight="0" marginwidth="0">

<center>
<br>

<!-- MAIN WINDOW -->
<table border="0" cellspacing="0" cellpadding="0">

<!-- Window shadow -->
<tr><td bgcolor="#808080">
<table border="0" cellspacing="0" cellpadding="0">
<tr><td bgcolor="#000000">
<table border="0" cellspacing="0" cellpadding="0">
<tr><td>

<!-- Window frame -->
<table border="0" cellspacing="1" cellpadding="0" bgcolor="#666666">
<tr><td bgcolor="#EEEEEE">

<!-- TITLE BAR -->
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr>
  <td bgcolor="#CCCCCC" height="18">
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
    <tr>
      <td width="12">&nbsp;</td>
      <td>
        <font face="Charcoal, Geneva, Chicago, Arial, sans-serif" size="2" color="#000000">
          <b>G3Bot &mdash; Chargement...</b>
        </font>
      </td>
      <td width="12" align="right">
        <font face="Chicago, Geneva, Arial, sans-serif" size="2" color="#000000"><b>&#215;</b></font>
      </td>
    </tr>
    </table>
  </td>
</tr>
<tr><td bgcolor="#BBBBBB" height="1"></td></tr>
</table>

<!-- CONTENT AREA -->
<table border="0" cellspacing="0" cellpadding="30" width="100%">
<tr><td align="center">

<font face="Charcoal, Geneva, Chicago, Arial, sans-serif" size="3">
  <b>Generation en cours...</b>
</font>
<br>
<font face="Geneva, Chicago, Arial, sans-serif" size="1" color="#555555">
  {{ model_id }}
</font>
<br><br>

<!-- PROGRESS BAR (Platinum style with 3D border) -->
<table border="0" cellspacing="0" cellpadding="0" width="60%">
<tr><td bgcolor="#FFFFFF">
<table border="0" cellspacing="1" cellpadding="0" width="100%">
<tr><td bgcolor="#666666">
<table border="0" cellspacing="0" cellpadding="0" width="100%">
<tr>
  <td bgcolor="#FFFFFF" height="16">
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
    <tr>
      {% if progress > 0 %}
      <td bgcolor="#3366CC" width="{{ progress }}%">&nbsp;</td>
      {% endif %}
      {% if progress < 100 %}
      <td bgcolor="#FFFFFF" width="{{ 100 - progress }}%">&nbsp;</td>
      {% endif %}
    </tr>
    </table>
  </td>
</tr>
</table>
</td></tr>
</table>
</td></tr>
</table>

<br>

<font face="Geneva, Chicago, Arial, sans-serif" size="1" color="#888888">
  {{ progress }}% &mdash; Rafraichissement automatique
</font>

</td></tr>
</table>

</td></tr>
</table>

</td></tr>
</table>
</td></tr>
</table>

</center>

</body>
</html>
